engine: nixery
when:
  - event: ["push", "pull_request"]
    branch: ["main"]

dependencies:
  nixpkgs:
    - nodejs
    - pnpm

steps:
  - name: install dependencies
    command: pnpm install --frozen-lockfile
  - name: knip
    command: pnpm run knip
  - name: typecheck
    command: pnpm run typecheck
  - name: lint
    command: pnpm run lint
  - name: build
    command: pnpm run build
