engine: nixery
when:
  - event: ["push", "pull_request"]
    branch: ["main"]

dependencies:
  nixpkgs:
    - nodejs

steps:
  - name: install dependencies
    command: npm ci
  - name: knip
    command: npm run knip
  - name: typecheck
    command: npm run typecheck
  - name: lint
    command: npm run lint
  - name: build
    command: npm run build
